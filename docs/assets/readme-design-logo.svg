<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">README Design Skill logo</title>
  <desc id="desc">A compact document, layout, checkmark, and design pencil mark for README design work.</desc>
  <defs>
    <linearGradient id="shell" x1="64" x2="448" y1="64" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="136" x2="376" y1="138" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#10a37f"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="pencil" x1="315" x2="399" y1="230" y2="354" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.52" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="42" y="42" width="428" height="428" rx="108" fill="url(#shell)"/>
  <circle cx="390" cy="124" r="42" fill="#38bdf8" opacity="0.14"/>
  <circle cx="116" cy="386" r="54" fill="#10a37f" opacity="0.12"/>

  <g filter="url(#softShadow)">
    <rect x="128" y="86" width="256" height="330" rx="42" fill="#ffffff" stroke="#111827" stroke-width="10"/>
    <rect x="168" y="132" width="88" height="18" rx="9" fill="#10a37f"/>
    <rect x="168" y="174" width="176" height="24" rx="12" fill="#111827"/>
    <rect x="168" y="226" width="148" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="168" y="258" width="108" height="14" rx="7" fill="#e2e8f0"/>
    <rect x="168" y="308" width="54" height="26" rx="13" fill="#dbeafe"/>
    <rect x="236" y="308" width="54" height="26" rx="13" fill="#dcfce7"/>
    <rect x="304" y="308" width="40" height="26" rx="13" fill="#fef3c7"/>
  </g>

  <path d="M112 250c27 1 43 18 61 49 23-64 69-104 137-124" fill="none" stroke="url(#accent)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#softShadow)" transform="rotate(-18 346 318)">
    <rect x="322" y="226" width="48" height="136" rx="22" fill="url(#pencil)" stroke="#111827" stroke-width="8"/>
    <path d="M322 344h48l-24 54z" fill="#fff7ed" stroke="#111827" stroke-width="8" stroke-linejoin="round"/>
    <path d="M346 384l-11 25h22z" fill="#111827"/>
    <rect x="324" y="230" width="44" height="34" rx="17" fill="#fef3c7" opacity="0.7"/>
  </g>
</svg>
