<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">README Design Skill logo</title>
  <desc id="desc">A polished README document mark with layout blocks, a design pen, and the README wordmark.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="48%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="760" height="360" fill="#f8fafc"/>
  <circle cx="602" cy="68" r="78" fill="#38bdf8" opacity="0.13"/>
  <circle cx="158" cy="300" r="96" fill="#10a37f" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="214" y="38" width="332" height="236" rx="28" fill="url(#page)" stroke="#0f172a" stroke-width="9"/>
    <rect x="246" y="70" width="82" height="18" rx="9" fill="#10a37f"/>
    <rect x="246" y="108" width="184" height="30" rx="15" fill="#0f172a"/>
    <rect x="246" y="158" width="236" height="14" rx="7" fill="#cbd5e1"/>
    <rect x="246" y="186" width="188" height="14" rx="7" fill="#e2e8f0"/>
    <rect x="246" y="224" width="66" height="26" rx="13" fill="#dbeafe"/>
    <rect x="326" y="224" width="66" height="26" rx="13" fill="#dcfce7"/>
    <rect x="406" y="224" width="66" height="26" rx="13" fill="#fef3c7"/>
  </g>

  <g filter="url(#shadow)" transform="rotate(-18 506 176)">
    <rect x="472" y="88" width="44" height="150" rx="20" fill="url(#gold)" stroke="#0f172a" stroke-width="7"/>
    <path d="M472 216h44l-22 46z" fill="#fff7ed" stroke="#0f172a" stroke-width="7" stroke-linejoin="round"/>
    <path d="M494 246l-9 22h18z" fill="#0f172a"/>
    <rect x="473" y="92" width="42" height="38" rx="18" fill="#fde68a" opacity="0.65"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M182 150c26 0 38 17 54 44 17-47 48-76 96-92" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="148" y="260" width="464" height="60" rx="18" fill="#0f172a"/>
    <text x="380" y="302" text-anchor="middle" font-family="Arial Black, Impact, ui-sans-serif, sans-serif" font-size="42" font-weight="900" fill="#f8fafc">README Design</text>
  </g>
</svg>
